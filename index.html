<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yaxuanli's homepage</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: #ffffff;
      background: linear-gradient(135deg, #141e30, #243b55);
      line-height: 1.6;
    }

    header {
      text-align: center;
      padding: 3rem 1rem;
      background: rgba(0,0,0,0.3);
    }

    header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    nav {
      text-align: center;
      background: rgba(0,0,0,0.2);
      padding: 1rem;
    }

    nav a {
      color: #ffffff;
      text-decoration: none;
      margin: 0 1rem;
      font-weight: 500;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #ffdd57;
    }

    main {
      max-width: 900px;
      margin: 3rem auto;
      padding: 2rem;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    }

    section {
      margin-bottom: 2rem;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
      border-bottom: 3px solid #ffdd57;
      display: inline-block;
      padding-bottom: 0.2rem;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background: rgba(0,0,0,0.3);
      position: fixed;
      bottom: 0;
      width: 100%;
      font-size: 0.9rem;
    }

    canvas#starfield {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -10;
    }

    @media (max-width: 768px) {
      header h1 { font-size: 2rem; }
      nav a { display: block; margin: 0.5rem 0; }
      main { margin: 2rem 1rem; padding: 1rem; }
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>

  <header>
    <h1>Welcome to yaxuanli's homepage</h1>
  </header>

  <nav>
    <a href="#About">About</a>
    <a href="#News">News</a>
    <a href="#Publications">Publications</a>
    <a href="#Honors">Honors</a>
    <a href="#Blog">Blog</a>
    <a href="#Contact">Contact</a>
  </nav>

  <main>
    <section id="About">
      <h2>About Me</h2>
      <p>Hi!</p>
    </section>

    <section id="Publications">
      <h2>Publications</h2>
      <p>TO DO.</p>
    </section>

    <section id="Contact">
      <h2>Contact</h2>
      <p>TO DO.</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 yaxuanli. All rights reserved.</p>
  </footer>

  <script>
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');

    let stars = [];
    const numStars = 150;

    function initCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      stars = [];
      for (let i = 0; i < numStars; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 1.5,
          speed: Math.random() * 0.4 + 0.1
        });
      }
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, 2 * Math.PI);
        ctx.fill();
      });
    }

    function updateStars() {
      stars.forEach(star => {
        star.y += star.speed;
        if (star.y > canvas.height) {
          star.y = 0;
          star.x = Math.random() * canvas.width;
        }
      });
    }

    function animate() {
      drawStars();
      updateStars();
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', initCanvas);

    initCanvas();
    animate();
  </script>
</body>
</html>
